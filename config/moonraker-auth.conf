# Moonraker Auth Configuration
# Edit this file to customize your installation

# Moonraker Backend
# The Moonraker instance that this auth layer will proxy to
MOONRAKER_HOST=127.0.0.1
MOONRAKER_PORT=7126

# Auth Proxy
# The port where the auth layer will listen for incoming requests
AUTH_PORT=7125

# Moonraker Service Key (NEVER ROTATE THIS)
# This is the static API key that the auth layer uses to communicate with Moonraker
# DO NOT change this after installation unless you know what you're doing
SERVICE_KEY=a3c256d7562541a69a5c5a8bcd036ecd

# Database Helper
# Internal port for the SQLite database helper (localhost only)
DB_HELPER_PORT=9999

# Paths (usually don't need to change these)
LOG_DIR=/var/log/nginx-auth
DB_PATH=/var/lib/nginx-auth/keys.db
JS_PATH=/usr/local/lib/moonraker-auth
